<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Padel ELO Manager</title>
    
    <!-- Standard favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />
    
    <!-- iOS icons - multiple sizes -->
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    
    <!-- iOS meta tags -->
    <meta name="apple-mobile-web-app-title" content="Padel ELO" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Meta tags generali -->
    <meta name="description" content="Gestione tornei di padel con sistema ELO" />
    <meta name="theme-color" content="#0f4c75" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        /* Light theme scrollbar */
        ::-webkit-scrollbar-track {
            background: #f1f5f9; /* bg-slate-100 */
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8; /* bg-slate-400 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; /* bg-slate-500 */
        }

        /* Dark theme scrollbar */
        .dark ::-webkit-scrollbar-track {
            background: #1f2937; /* bg-gray-800 */
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #4b5563; /* bg-gray-600 */
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* bg-gray-500 */
        }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-primary': '#0ea5e9', // sky-500
              'brand-secondary': '#6366f1', // indigo-500
              'gray-900': '#111827',
              'gray-800': '#1f2937',
              'gray-700': '#374151',
              'gray-600': '#4b5563',
              'gray-500': '#6b7280',
              'gray-400': '#9ca3af',
              'gray-300': '#d1d5db',
              'gray-200': '#e5e7eb',
              'gray-100': '#f3f4f6',
            }
          }
        }
      }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
